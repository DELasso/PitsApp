<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<div class="cart-main-container">
  <div class="cart-products">
    <h2>Tu carrito de compras</h2>
    <div *ngIf="items.length > 0; else emptyCart">
      <div class="cart-item" *ngFor="let item of items; let i = index">
        <div class="cart-icon">
          <i [class]="item.icon + ' fa-2x'"></i>
        </div>
        <div>
          <h3>{{ item.name }}</h3>
          <p>{{ item.description }}</p>
          <p><strong>Precio:</strong> {{ item.price | currency: 'cop' }}</p>
          <button class="btn btn-danger" (click)="removeItem(i)">Eliminar</button>
        </div>
      </div>
    </div>
    <ng-template #emptyCart>
      <p>Tu carrito está vacío 🛒</p>
    </ng-template>
  </div>
  <div class="cart-summary">
    <div class="summary-item">
      <span>Subtotal ({{ items.length }} item(s)):</span>
      <span>{{ getTotal() | currency:'COP':'symbol':'1.0-0' }}</span>
    </div>
    <div class="summary-item">
      <span>Envío:</span>
      <span>Gratis</span>
    </div>
    <div class="summary-item total">
      <span>Total:</span>
      <span>{{ getTotal() | currency:'COP':'symbol':'1.0-0' }}</span>
    </div>
    <button class="btn btn-primary" (click)="checkout()">Pagar</button>
  </div>
</div>
